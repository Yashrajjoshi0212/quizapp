<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Quick Quiz</h1>

    <div id="quiz-box">
        <p id="question"></p>
        <ul id="answer-list"></ul>
    </div>

    <div class="controls">
        <span id="score">Score: 0</span>
        <button id="next">Next</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
